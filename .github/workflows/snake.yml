name: Generate Snake

on:
  schedule:
    - cron: "0 0 * * *"

  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: Platane/snk@v3
        with:
          github_user_name: EduardaUchida
          outputs: |
            dist/github-contribution-grid-snake.svg

      - uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

 - uses: Platane/snk@v3
  with:
    github_user_name: EduardaUchida
    outputs: |
      dist/github-snake.svg?color_snake=D4AF37&color_dots=#0D1117,#3A2E00,#6B5200,#B8860B,#FFD700
